{% extends "base.html" %}

{% block title %}Page Not Found | {{ site.name }}{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 1rem;">
    <h1 style="font-size: 4rem; color: var(--primary-color);">404</h1>
    <h2>Page Not Found</h2>
    <p style="margin-bottom: 2rem;">The page you are looking for doesn't exist or has been moved.</p>
    <a href="/" style="background: var(--primary-color); color: white; padding: 0.75rem 1.5rem; text-decoration: none; border-radius: 4px; font-weight: bold;">Return Home</a>
</div>
{% endblock %}
